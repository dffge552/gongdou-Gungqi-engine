<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>宮棋</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #1a1510;
    --panel:  #221d17;
    --border: #5a4a32;
    --accent: #c8963c;
    --text:   #d4c4a0;
    --dim:    #7a6a50;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px 40px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(200,150,60,.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(100,180,100,.05) 0%, transparent 50%);
  }

  h1 {
    font-size: 2rem; letter-spacing: .25em;
    color: var(--accent); text-shadow: 0 0 30px rgba(200,150,60,.3);
    margin-bottom: 4px;
  }
  .subtitle { font-size: .75rem; color: var(--dim); letter-spacing: .15em; margin-bottom: 18px; }

  .controls {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    justify-content: center;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 18px; margin-bottom: 14px; font-size: .82rem;
  }
  .controls label { color: var(--dim); }
  .controls select, .controls input[type=range] { accent-color: var(--accent); }
  .controls input[type=range] { width: 90px; cursor: pointer; }
  .ctrl-val { color: var(--accent); font-family: 'Share Tech Mono', monospace; min-width: 32px; display:inline-block; }

  button {
    font-family: 'Noto Serif TC', serif; font-size: .82rem;
    padding: 6px 14px; border-radius: 5px;
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    cursor: pointer; transition: background .15s, color .15s;
  }
  button:hover { background: var(--border); color: #fff; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #1a1510; font-weight:700; }
  button.primary:hover { background: #e0aa50; }
  button:disabled { opacity: .35; cursor: not-allowed; }

  .status-bar {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap; justify-content: center;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 18px; margin-bottom: 12px; font-size: .82rem;
  }
  .turn-dot {
    width: 11px; height: 11px; border-radius: 50%; display: inline-block; margin-right: 4px; border: 2px solid;
  }
  .turn-dot.black { background: #1a1a1a; border-color: #666; }
  .turn-dot.white { background: #f0e8d8; border-color: #bbb; }
  .msg { color: var(--accent); font-weight: 700; }
  .iters { font-family: 'Share Tech Mono', monospace; color: var(--dim); font-size:.75rem; }

  .scores { display: flex; gap: 24px; margin-bottom: 12px; }
  .score-box {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 20px; text-align: center; min-width: 100px;
  }
  .score-box .who { font-size:.7rem; color:var(--dim); letter-spacing:.1em; margin-bottom:2px; }
  .score-box .num { font-size:1.6rem; font-family:'Share Tech Mono',monospace; color:var(--accent); }

  .board-wrap {
    position: relative;
    background: #2a2010;
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: 28px;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
  }
  #boardCanvas { display: block; cursor: crosshair; }

  .thinking-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.45); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; color: var(--accent); letter-spacing: .2em;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .thinking-overlay.show { opacity: 1; pointer-events: all; }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.65);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }
  .result-box {
    background: var(--panel); border: 2px solid var(--border);
    border-radius: 12px; padding: 32px 48px; text-align: center;
    transform: translateY(-20px); transition: transform .25s; max-width: 340px;
  }
  .overlay.show .result-box { transform: translateY(0); }
  .result-box h2 { font-size: 1.5rem; color: var(--accent); margin-bottom: 8px; }
  .result-box .detail { font-size: .9rem; color: var(--dim); margin-bottom: 20px; line-height: 1.8; }
  .result-box .detail span { color: var(--text); font-weight:700; }
  .sep { color: var(--border); }

  #wasmStatus {
    font-size: .72rem; color: var(--dim); margin-bottom: 10px;
    font-family: 'Share Tech Mono', monospace; letter-spacing: .05em;
  }
  #wasmStatus.ok  { color: #6abf6a; }
  #wasmStatus.err { color: #c85a5a; }
</style>
</head>
<body>

<h1>宮　棋</h1>
<p class="subtitle">宮豆 · 10×10 · 統計覆蓋 · WASM</p>

<div id="wasmStatus">⏳ 載入 WASM 中…</div>

<div class="controls">
  <label>我執</label>
  <select id="myColor">
    <option value="1">黑（先手）</option>
    <option value="-1">白（後手）</option>
  </select>
  <span class="sep">｜</span>
  <label>AI 思考時間</label>
  <input type="range" id="timeSlider" min="500" max="10000" step="500" value="3000">
  <span class="ctrl-val" id="timeVal">3.0s</span>
  <span class="sep">｜</span>
  <button class="primary" id="btnStart" onclick="startGame()" disabled>開始新局</button>
  <button id="btnUndo" onclick="undo()" disabled>悔棋</button>
</div>

<div class="status-bar">
  <span id="turnIndicator">—</span>
  <span class="msg" id="msgText">等待 WASM 載入…</span>
  <span class="iters" id="itersText"></span>
</div>

<div class="scores">
  <div class="score-box">
    <div class="who" id="labelB">黑棋</div>
    <div class="num" id="scoreB">—</div>
  </div>
  <div class="score-box">
    <div class="who" id="labelW">白棋（AI）</div>
    <div class="num" id="scoreW">—</div>
  </div>
</div>

<div class="board-wrap">
  <canvas id="boardCanvas"></canvas>
  <div class="thinking-overlay" id="thinkingOverlay">AI 思考中…</div>
</div>

<div class="overlay" id="resultOverlay">
  <div class="result-box">
    <h2 id="resultTitle">—</h2>
    <div class="detail" id="resultDetail"></div>
    <button class="primary" onclick="startGame()">再來一局</button>
  </div>
</div>

<!-- 載入 Emscripten 產生的膠水層，會自動找同目錄的 gongqi_core.wasm -->
<script src="gongqi_core.js"></script>
<script>
// ════════════════════════════════════
//  常數
// ════════════════════════════════════
const N        = 10;
const GAP      = 50;
const MARGIN   = 32;
const STONE_R  = 21;
const SNAP_R   = 26;
const CANVAS_W = MARGIN * 2 + GAP * (N - 1);

// ════════════════════════════════════
//  Canvas
// ════════════════════════════════════
const canvas = document.getElementById('boardCanvas');
canvas.width = canvas.height = CANVAS_W;
const ctx = canvas.getContext('2d');

const cx = c => MARGIN + c * GAP;
const cy = r => MARGIN + r * GAP;

// ════════════════════════════════════
//  狀態
// ════════════════════════════════════
let board = [], history = [];
let myColor = 1, currentPlayer = 1;
let gameRunning = false, lastMove = null, hoverPos = null;
let timeLimitMs = 3000;

// ════════════════════════════════════
//  WASM 初始化
// ════════════════════════════════════
let wasmReady = false;

Module.onRuntimeInitialized = () => {
  Module._init();
  // 用當前時間作為亂數種子
  Module._seed_rng(Date.now() & 0x7fffffff);
  wasmReady = true;

  const el = document.getElementById('wasmStatus');
  el.textContent = '✓ WASM 已就緒';
  el.className = 'ok';
  document.getElementById('btnStart').disabled = false;
  setMsg('按「開始新局」開始');
};

// 萬一載入失敗
Module.onAbort = (reason) => {
  const el = document.getElementById('wasmStatus');
  el.textContent = '✗ WASM 載入失敗：' + reason;
  el.className = 'err';
  setMsg('WASM 載入失敗，請確認 gongqi_core.wasm 在同一目錄');
};

// ════════════════════════════════════
//  呼叫 WASM AI
// ════════════════════════════════════
function askWasmAI(player, ms) {
  // 把 JS board 同步到 WASM
  Module._clear_board();
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      Module._set_cell(r, c, board[r][c]);

  // 計算
  Module._best_move(player, ms);

  return {
    row:   Module._result_row(),
    col:   Module._result_col(),
    iters: Module._result_iters(),
  };
}

// ════════════════════════════════════
//  繪製
// ════════════════════════════════════
function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_W);

  ctx.fillStyle = '#2e2510';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_W);

  // 格線
  ctx.strokeStyle = '#8a7055';
  ctx.lineWidth = 1;
  for (let i = 0; i < N; i++) {
    ctx.beginPath(); ctx.moveTo(cx(0), cy(i)); ctx.lineTo(cx(N-1), cy(i)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx(i), cy(0)); ctx.lineTo(cx(i), cy(N-1)); ctx.stroke();
  }

  // 星位
  ctx.fillStyle = '#8a7055';
  for (const [r, c] of [[4,4],[2,2],[2,7],[7,2],[7,7]]) {
    ctx.beginPath(); ctx.arc(cx(c), cy(r), 3.5, 0, Math.PI*2); ctx.fill();
  }

  // hover 預覽
  if (hoverPos && gameRunning && currentPlayer === myColor) {
    const [hr, hc] = hoverPos;
    if (board[hr][hc] === 0) {
      ctx.save(); ctx.globalAlpha = 0.3;
      drawStone(cx(hc), cy(hr), myColor);
      ctx.restore();
    }
  }

  // 棋子
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      if (board[r][c] === 0) continue;
      drawStone(cx(c), cy(r), board[r][c]);
      if (lastMove && lastMove[0] === r && lastMove[1] === c) {
        ctx.fillStyle = 'rgba(220,80,60,0.85)';
        ctx.beginPath(); ctx.arc(cx(c), cy(r), 5, 0, Math.PI*2); ctx.fill();
      }
    }
  }
}

function drawStone(x, y, player) {
  const g = ctx.createRadialGradient(x - STONE_R*0.35, y - STONE_R*0.35, 1, x, y, STONE_R);
  if (player === 1) {
    g.addColorStop(0, '#7a7a7a'); g.addColorStop(1, '#0d0d0d');
    ctx.shadowColor = 'rgba(0,0,0,.75)';
  } else {
    g.addColorStop(0, '#ffffff'); g.addColorStop(1, '#c8c8c8');
    ctx.shadowColor = 'rgba(0,0,0,.45)';
  }
  ctx.shadowBlur = 7;
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, STONE_R, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
}

// ════════════════════════════════════
//  滑鼠
// ════════════════════════════════════
function nearestIntersection(evt) {
  const rect = canvas.getBoundingClientRect();
  const mx = evt.clientX - rect.left;
  const my = evt.clientY - rect.top;
  const c = Math.round((mx - MARGIN) / GAP);
  const r = Math.round((my - MARGIN) / GAP);
  if (r < 0 || r >= N || c < 0 || c >= N) return null;
  const dx = mx - cx(c), dy = my - cy(r);
  if (Math.hypot(dx, dy) > SNAP_R) return null;
  return [r, c];
}

canvas.addEventListener('mousemove', e => { hoverPos = nearestIntersection(e); draw(); });
canvas.addEventListener('mouseleave', () => { hoverPos = null; draw(); });
canvas.addEventListener('click', e => {
  const pos = nearestIntersection(e);
  if (!pos) return;
  const [r, c] = pos;
  if (!gameRunning || currentPlayer !== myColor || board[r][c] !== 0) return;
  placeStone(r, c, myColor);
});

// ════════════════════════════════════
//  控制
// ════════════════════════════════════
document.getElementById('timeSlider').oninput = function() {
  timeLimitMs = parseInt(this.value);
  document.getElementById('timeVal').textContent = (timeLimitMs / 1000).toFixed(1) + 's';
};

function startGame() {
  if (!wasmReady) return;
  myColor = parseInt(document.getElementById('myColor').value);
  currentPlayer = 1; gameRunning = true;
  board = Array.from({length:N}, () => Array(N).fill(0));
  history = []; lastMove = null; hoverPos = null;
  document.getElementById('btnUndo').disabled = false;
  document.getElementById('scoreB').textContent = '—';
  document.getElementById('scoreW').textContent = '—';
  document.getElementById('itersText').textContent = '';
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('labelB').textContent = myColor===1 ? '黑棋（你）' : '黑棋（AI）';
  document.getElementById('labelW').textContent = myColor===-1 ? '白棋（你）' : '白棋（AI）';
  // 每局給新的亂數種子
  Module._seed_rng(Date.now() & 0x7fffffff);
  draw(); updateStatus();
  if (myColor === -1) triggerAI();
}

function placeStone(r, c, player) {
  history.push({ board: board.map(row=>[...row]), lastMove, currentPlayer });
  board[r][c] = player;
  lastMove = [r, c];
  currentPlayer = -currentPlayer;
  draw(); updateStatus();
  if (isFull()) { endGame(); return; }
  if (currentPlayer !== myColor) triggerAI();
}

function isFull() { return board.every(row => row.every(v => v !== 0)); }

// ════════════════════════════════════
//  AI 呼叫（WASM，用 setTimeout 讓畫面先更新）
// ════════════════════════════════════
function triggerAI() {
  document.getElementById('thinkingOverlay').classList.add('show');
  document.getElementById('btnUndo').disabled = true;
  setMsg('AI 思考中…');

  // 讓瀏覽器先渲染 overlay，再跑 WASM（WASM 會阻塞主執行緒）
  setTimeout(() => {
    const data = askWasmAI(currentPlayer, timeLimitMs);
    document.getElementById('itersText').textContent =
      data.iters > 0 ? `${data.iters.toLocaleString()} iters` : '';
    document.getElementById('thinkingOverlay').classList.remove('show');
    document.getElementById('btnUndo').disabled = false;
    placeStone(data.row, data.col, currentPlayer);
  }, 30);
}

function undo() {
  if (!gameRunning || history.length === 0) return;
  const steps = currentPlayer === myColor ? 2 : 1;
  for (let i = 0; i < steps && history.length > 0; i++) {
    const s = history.pop();
    board = s.board; lastMove = s.lastMove; currentPlayer = s.currentPlayer;
  }
  document.getElementById('itersText').textContent = '';
  draw(); updateStatus();
}

function endGame() {
  gameRunning = false;
  const [bc, wc] = calculateCaptures(board.map(r=>[...r]));
  document.getElementById('scoreB').textContent = bc;
  document.getElementById('scoreW').textContent = wc;
  const my = myColor===1 ? bc : wc, ai = myColor===1 ? wc : bc;
  let title, detail;
  if (my > ai)      { title='🎉 你贏了！'; detail=`你吃了 <span>${my}</span> 顆，AI 吃了 <span>${ai}</span> 顆`; }
  else if (my < ai) { title='😔 AI 獲勝'; detail=`AI 吃了 <span>${ai}</span> 顆，你吃了 <span>${my}</span> 顆`; }
  else              { title='🤝 平局';    detail=`雙方各吃 <span>${my}</span> 顆`; }
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultDetail').innerHTML = detail;
  document.getElementById('resultOverlay').classList.add('show');
}

function updateStatus() {
  const cc = currentPlayer===1 ? 'black' : 'white';
  const cn = currentPlayer===1 ? '黑棋' : '白棋';
  document.getElementById('turnIndicator').innerHTML = `<span class="turn-dot ${cc}"></span>${cn}`;
  if (gameRunning) setMsg(currentPlayer===myColor ? '請落子' : 'AI 回合');
}
function setMsg(t) { document.getElementById('msgText').textContent = t; }

// ════════════════════════════════════
//  JS 版 calculate_captures（終局計分用）
// ════════════════════════════════════
function getAllLines(){
  const L=[];
  for(let r=0;r<N;r++){const l=[];for(let c=0;c<N;c++)l.push([r,c]);L.push(l);}
  for(let c=0;c<N;c++){const l=[];for(let r=0;r<N;r++)l.push([r,c]);L.push(l);}
  for(let s=-(N-1);s<N;s++){const l=[];for(let i=0;i<N;i++){const r=s+i,c=i;if(r>=0&&r<N)l.push([r,c]);}if(l.length>=3)L.push(l);}
  for(let s=0;s<2*N-1;s++){const l=[];for(let i=0;i<N;i++){const r=s-i,c=i;if(r>=0&&r<N)l.push([r,c]);}if(l.length>=3)L.push(l);}
  return L;
}
const ALL_JS = getAllLines();

function findGroups(line,b,pl){
  const st=[];
  for(let i=0;i<line.length;i++) if(b[line[i][0]][line[i][1]]===pl) st.push([i,line[i]]);
  if(!st.length) return [];
  const gs=[]; let s=0;
  for(let k=1;k<=st.length;k++){
    if(k===st.length||st[k][0]!==st[k-1][0]+1){
      const len=k-s;
      if(len>=2){const pos=[];for(let j=s;j<k;j++)pos.push(st[j][1]);gs.push({start:st[s][0],len,pos});}
      s=k;
    }
  }
  return gs;
}
function isProt(b,pos){
  const pl=b[pos[0]][pos[1]]; if(!pl) return false;
  for(const ln of ALL_JS){
    if(!ln.some(p=>p[0]===pos[0]&&p[1]===pos[1])) continue;
    for(const g of findGroups(ln,b,pl))
      if(g.len>=3&&g.pos.some(p=>p[0]===pos[0]&&p[1]===pos[1])) return true;
  }
  return false;
}
function findPar(positions,b,opp,count,both=false){
  if(positions.length<2) return [];
  const dr=positions[1][0]-positions[0][0],dc=positions[1][1]-positions[0][1];
  let perp=dr===0?[[-1,0],[1,0]]:dc===0?[[0,-1],[0,1]]:[[-dr,dc],[dr,-dc]];
  const rm=[];
  for(const [pdr,pdc] of perp){
    const ca=[]; let ok=true;
    for(const [r,c] of positions){
      const nr=r+pdr,nc=c+pdc;
      if(nr<0||nr>=N||nc<0||nc>=N||b[nr][nc]!==opp){ok=false;break;}
      ca.push([nr,nc]);
    }
    if(ok&&ca.length===count){ca.forEach(p=>rm.push(p));if(!both)break;}
  }
  return rm;
}
function calculateCaptures(b){
  let bc=0,wc=0;
  for(const pr of [6,5,4,3]){
    const acts=[];
    for(const ln of ALL_JS) for(const pl of [1,-1]) for(const g of findGroups(ln,b,pl)){
      if(g.len!==pr) continue;
      const opp=-pl; let rm=[];
      if(pr===3){
        if(g.start>0){const lp=ln[g.start-1];if(b[lp[0]][lp[1]]===opp)rm.push(lp);}
        const ri=g.start+g.len;if(ri<ln.length){const rp=ln[ri];if(b[rp[0]][rp[1]]===opp)rm.push(rp);}
        if(rm.length) rm=[rm[0]];
      } else if(pr===4){
        if(g.start>0){const lp=ln[g.start-1];if(b[lp[0]][lp[1]]===opp)rm.push(lp);}
        const ri=g.start+g.len;if(ri<ln.length){const rp=ln[ri];if(b[rp[0]][rp[1]]===opp)rm.push(rp);}
      } else rm=findPar(g.pos,b,opp,pr===5?5:6,pr===6);
      if(rm.length){
        const seen=new Set(); rm=rm.filter(p=>{const k=p[0]+','+p[1];if(seen.has(k))return false;seen.add(k);return true;});
        acts.push([pl,rm]);
      }
    }
    for(const [pl,pos] of acts) for(const p of pos){
      if(b[p[0]][p[1]]!==-pl) continue;
      if(isProt(b,p)) continue;
      b[p[0]][p[1]]=0; if(pl===1) bc++; else wc++;
    }
  }
  return [bc,wc];
}

// 初始畫面
draw();
</script>
</body>
</html>
